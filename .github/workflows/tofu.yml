name: Infrastructure

on:
  pull_request:
    branches: [main]
    paths: ['tofu/**']
  push:
    branches: [main]
    paths: ['tofu/**', 'k8s/**']
  workflow_dispatch:

concurrency:
  group: tofu-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.9.0'

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        id: secrets
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"
          echo "github_pat=$GITHUB_PAT" >> $GITHUB_OUTPUT

          AUTH0_SECRET=$(az keyvault secret show --vault-name romaine-kv --name auth0-client-secret --query value -o tsv)
          echo "::add-mask::$AUTH0_SECRET"
          echo "auth0_secret=$AUTH0_SECRET" >> $GITHUB_OUTPUT

      - name: Initialize OpenTofu
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=nelsontofu" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra-bootstrap.tfstate"

      - name: Plan
        id: plan
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
          TF_VAR_github_owner: nelsong6
          AUTH0_CLIENT_SECRET: ${{ steps.secrets.outputs.auth0_secret }}
        run: |
          set -o pipefail
          tofu plan -out=tfplan 2>&1 | tee plan_output.txt

          # Check plan for actual changes using tofu show
          PLAN_JSON=$(tofu show -json tfplan)
          RESOURCE_CHANGES=$(echo "$PLAN_JSON" | jq '[.resource_changes[]? | select((.change.actions | . != ["no-op"]) or .change.importing)] | length')

          echo "Resource changes detected: $RESOURCE_CHANGES"
          if [ "$RESOURCE_CHANGES" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "### Infrastructure changes detected ($RESOURCE_CHANGES resources)" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "### No infrastructure changes detected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('tofu/plan_output.txt', 'utf8');
            const maxLen = 60000;
            const truncated = planOutput.length > maxLen
              ? planOutput.substring(0, maxLen) + '\n\n... (truncated)'
              : planOutput;

            const body = `### OpenTofu Plan
            <details>
            <summary>Click to expand plan output</summary>

            \`\`\`
            ${truncated}
            \`\`\`
            </details>`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('### OpenTofu Plan')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: tofu/tfplan
          retention-days: 1

  apply:
    name: Apply
    needs: plan
    if: github.event_name != 'pull_request' && needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v2
        with:
          tofu_version: '1.9.0'

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Fetch secrets from Key Vault
        id: secrets
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          echo "::add-mask::$GITHUB_PAT"
          echo "github_pat=$GITHUB_PAT" >> $GITHUB_OUTPUT

          AUTH0_SECRET=$(az keyvault secret show --vault-name romaine-kv --name auth0-client-secret --query value -o tsv)
          echo "::add-mask::$AUTH0_SECRET"
          echo "auth0_secret=$AUTH0_SECRET" >> $GITHUB_OUTPUT

      - name: Initialize OpenTofu
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
        run: |
          tofu init \
            -backend-config="resource_group_name=infra" \
            -backend-config="storage_account_name=nelsontofu" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=infra-bootstrap.tfstate"

      - name: Download plan artifact
        uses: actions/download-artifact@v8
        with:
          name: tfplan
          path: tofu

      - name: Apply
        working-directory: tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
          TF_VAR_github_pat: ${{ steps.secrets.outputs.github_pat }}
          TF_VAR_github_owner: nelsong6
          AUTH0_CLIENT_SECRET: ${{ steps.secrets.outputs.auth0_secret }}
        run: |
          tofu apply tfplan
          echo "### Apply successful" >> $GITHUB_STEP_SUMMARY

  bootstrap:
    name: Bootstrap Cluster
    needs: [plan, apply]
    if: always() && !cancelled() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login via OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      # ── Cluster access ───────────────────────────────────────────
      - name: Get AKS credentials
        id: aks
        run: |
          if az aks get-credentials --resource-group infra --name infra-aks 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "### Bootstrap skipped — AKS cluster not found" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 1. Envoy Gateway ──────────────────────────────────────────
      - name: Check Envoy Gateway
        id: gateway
        if: steps.aks.outputs.exists == 'true'
        run: |
          if kubectl get namespace envoy-gateway-system 2>/dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Envoy Gateway
        if: steps.aks.outputs.exists == 'true' && steps.gateway.outputs.installed == 'false'
        run: |
          helm install eg oci://docker.io/envoyproxy/gateway-helm \
            --version v1.3.2 \
            --namespace envoy-gateway-system \
            --create-namespace \
            --wait --timeout 5m

      - name: Apply Gateway resource
        if: steps.aks.outputs.exists == 'true'
        run: |
          kubectl apply -f k8s/bootstrap/gateway.yaml

      # ── 2. ExternalDNS ─────────────────────────────────────────────
      - name: Check ExternalDNS
        id: extdns
        if: steps.aks.outputs.exists == 'true'
        run: |
          if kubectl get namespace external-dns 2>/dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install ExternalDNS
        if: steps.aks.outputs.exists == 'true' && steps.extdns.outputs.installed == 'false'
        run: |
          CLIENT_ID=$(az identity show \
            --resource-group infra --name infra-shared-identity \
            --query clientId -o tsv)

          helm repo add external-dns https://kubernetes-sigs.github.io/external-dns
          helm repo update
          helm install external-dns external-dns/external-dns \
            --namespace external-dns \
            --create-namespace \
            --set provider.name=azure \
            --set txtOwnerId=infra-aks \
            --set policy=sync \
            --set "sources={gateway-httproute,gateway-grpcroute,gateway-tcproute,gateway-tlsroute}" \
            --set "extraArgs[0]=--azure-resource-group=infra" \
            --set "extraArgs[1]=--azure-subscription-id=${{ vars.ARM_SUBSCRIPTION_ID }}" \
            --set "serviceAccount.annotations.azure\.workload\.identity/client-id=$CLIENT_ID" \
            --set-string "podLabels.azure\.workload\.identity/use=true" \
            --set "domainFilters[0]=romaine.life" \
            --wait --timeout 5m

      # ── 3. cert-manager ──────────────────────────────────────────
      - name: Check cert-manager
        id: certmgr
        if: steps.aks.outputs.exists == 'true'
        run: |
          if kubectl get namespace cert-manager 2>/dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install cert-manager
        if: steps.aks.outputs.exists == 'true' && steps.certmgr.outputs.installed == 'false'
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --set crds.install=true \
            --set featureGates="ExperimentalGatewayAPISupport=true" \
            --wait --timeout 5m

      - name: Apply ClusterIssuer
        if: steps.aks.outputs.exists == 'true'
        run: |
          kubectl apply -f k8s/bootstrap/cluster-issuer.yaml

      # ── 4. ArgoCD ────────────────────────────────────────────────
      - name: Check ArgoCD
        id: argocd
        if: steps.aks.outputs.exists == 'true'
        run: |
          if kubectl get namespace argocd 2>/dev/null; then
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Install ArgoCD
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.installed == 'false'
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update
          helm install argocd argo/argo-cd \
            --namespace argocd \
            --create-namespace \
            --values k8s/argocd/values.yaml \
            --wait --timeout 5m

      - name: Configure private repo access
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.installed == 'false'
        run: |
          GITHUB_PAT=$(az keyvault secret show --vault-name romaine-kv --name github-pat --query value -o tsv)
          kubectl create secret generic infra-bootstrap-repo \
            --namespace argocd \
            --from-literal=type=git \
            --from-literal=url=https://github.com/nelsong6/infra-bootstrap.git \
            --from-literal=password="$GITHUB_PAT" \
            --from-literal=username=nelsong6
          kubectl label secret infra-bootstrap-repo \
            --namespace argocd \
            argocd.argoproj.io/secret-type=repository

      - name: Apply root app-of-apps
        if: steps.aks.outputs.exists == 'true' && steps.argocd.outputs.installed == 'false'
        run: |
          kubectl apply -f k8s/argocd/root-app.yaml

      - name: Apply ArgoCD certificate and route
        if: steps.aks.outputs.exists == 'true'
        run: |
          kubectl apply -f k8s/bootstrap/argocd-cert.yaml
          kubectl apply -f k8s/bootstrap/argocd-route.yaml

      # ── Summary ──────────────────────────────────────────────────
      - name: Bootstrap summary
        if: steps.aks.outputs.exists == 'true'
        run: |
          echo "### Cluster Bootstrap Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Envoy Gateway | ${{ steps.gateway.outputs.installed == 'true' && '✅ existing' || '🆕 installed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ExternalDNS | ${{ steps.extdns.outputs.installed == 'true' && '✅ existing' || '🆕 installed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| cert-manager | ${{ steps.certmgr.outputs.installed == 'true' && '✅ existing' || '🆕 installed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ArgoCD | ${{ steps.argocd.outputs.installed == 'true' && '✅ existing' || '🆕 installed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.argocd.outputs.installed }}" = "false" ]; then
            echo "🔑 Get ArgoCD admin password:" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
