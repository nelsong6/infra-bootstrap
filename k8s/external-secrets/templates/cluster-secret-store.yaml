# ClusterSecretStore for Azure Key Vault.
# All ExternalSecrets across namespaces reference this store.
# Authenticates via workload identity on the shared managed identity.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: romaine-kv
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: https://romaine-kv.vault.azure.net
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
