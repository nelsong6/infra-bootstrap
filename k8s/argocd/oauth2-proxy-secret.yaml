# ExternalSecret for oauth2-proxy credentials.
# Pulls client ID, client secret, and cookie secret from Key Vault
# into a K8s secret that the oauth2-proxy Helm chart references.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: oauth2-proxy
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: oauth2-proxy-credentials
  data:
    - secretKey: client-id
      remoteRef:
        key: argocd-oidc-client-id
    - secretKey: client-secret
      remoteRef:
        key: argocd-oidc-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: oauth2-proxy-cookie-secret
