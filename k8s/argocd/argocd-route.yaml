# HTTPRoute for ArgoCD UI.
# Routes argocd.romaine.life through oauth2-proxy for authentication,
# which forwards authenticated requests to ArgoCD server.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - argocd.romaine.life
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
