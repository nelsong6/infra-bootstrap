# HTTPRoute for ArgoCD UI.
# Traffic goes directly to ArgoCD server. Auth is handled by
# SecurityPolicy calling oauth2-proxy as an external auth check.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - argocd.romaine.life
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
---
# oauth2-proxy handles login/callback/sign-out paths only.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-oauth2
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - argocd.romaine.life
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /oauth2
      backendRefs:
        - name: oauth2-proxy
          port: 4180
---
# SecurityPolicy: external auth check via oauth2-proxy.
# Envoy calls oauth2-proxy on every request to verify the session.
# If no valid session, oauth2-proxy returns a redirect to the login page.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: argocd-auth
  namespace: argocd
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: argocd
  extAuth:
    http:
      backendRefs:
        - name: oauth2-proxy
          port: 4180
      path: /oauth2/auth
      headersToBackend:
        - x-auth-request-user
        - x-auth-request-email
