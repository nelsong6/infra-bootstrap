# HTTPRoute for ArgoCD UI.
# Routes argocd.romaine.life directly to ArgoCD server.
# Auth handled by ArgoCD's built-in OIDC (Microsoft Entra).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
  hostnames:
    - argocd.romaine.life
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
