# HTTPRoute for the ArgoCD UI. Attaches to the argocd XListenerSet (same
# namespace) rather than the shared Gateway directly — the XListenerSet
# owns the HTTPS listener + cert ref for argocd.romaine.life.
# Auth handled by ArgoCD's built-in OIDC via dex (Microsoft Entra).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  hostnames:
    - argocd.romaine.life
  parentRefs:
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: argocd
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: argocd-server
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
