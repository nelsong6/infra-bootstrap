# TLS certificate for ArgoCD via Let's Encrypt.
# cert-manager issues this using HTTP-01 challenge through the
# Gateway's HTTP listener.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls
  namespace: argocd
spec:
  secretName: argocd-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - argocd.romaine.life
