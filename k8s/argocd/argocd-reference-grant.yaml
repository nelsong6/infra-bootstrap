# Allows the Gateway in envoy-gateway-system to reference the
# argocd-tls Secret in the argocd namespace for TLS termination.
# Gateway API requires explicit cross-namespace permission.
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-gateway-tls
  namespace: argocd
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: envoy-gateway-system
  to:
    - group: ""
      kind: Secret
