# ArgoCD Helm chart values (argo/argo-cd)
# Minimal config for personal infra — single replica, no HA.
# Routing handled by Gateway API (HTTPRoute + Envoy Gateway),
# not ArgoCD's built-in ingress.

global:
  logging:
    level: warn

configs:
  # OIDC config — Microsoft Entra ID
  cm:
    url: https://argocd.romaine.life
    oidc.config: |
      name: Microsoft
      issuer: https://login.microsoftonline.com/2236b5e4-81d2-4d82-bde5-17b1037999ea/v2.0
      clientID: $oidc.clientId
      clientSecret: $oidc.clientSecret
      requestedScopes:
        - openid
        - profile
        - email
  # RBAC — personal tenant, only one user, default to admin
  rbac:
    policy.default: role:readonly
    policy.csv: |
      g, cf57d57d-1411-4f59-b517-e9a8600b140a, role:admin

# Single replica — personal infra, no HA needed
controller:
  replicas: 1

server:
  replicas: 1
  # Gateway handles TLS termination — disable ArgoCD's internal TLS
  extraArgs:
    - --insecure

repoServer:
  replicas: 1

redis:
  enabled: true

# Disable dex (using ArgoCD's built-in OIDC)
dex:
  enabled: false

# Disable notifications (can enable later)
notifications:
  enabled: false

# Disable applicationSet (can enable later if needed)
applicationSet:
  enabled: false
