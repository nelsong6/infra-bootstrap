# ArgoCD Helm chart values (argo/argo-cd)
# Minimal config for personal infra — single replica, no HA.
# Routing handled by Gateway API (HTTPRoute + Envoy Gateway),
# not ArgoCD's built-in ingress.

global:
  logging:
    level: warn

configs:
  # Enable Kustomize Helm chart inflation
  cm:
    kustomize.buildOptions: --enable-helm
    url: https://argocd.romaine.life
    dex.config: |
      connectors:
        - type: microsoft
          id: microsoft
          name: Microsoft
          config:
            clientID: $dex.microsoft.clientID
            clientSecret: $dex.microsoft.clientSecret
            redirectURI: https://argocd.romaine.life/api/dex/callback
            tenant: common
            scopes:
              - openid
              - profile
              - email
              - user.read
        # Federate AKS-issued projected SA tokens. In-cluster MCP servers
        # mint a SA token with aud=argocd-mcp and exchange it for an ArgoCD
        # bearer via /api/dex/token (grant_type=token-exchange,
        # connector_id=aks-sa). No static API tokens leave the cluster.
        - type: oidc
          id: aks-sa
          name: AKS Service Account
          config:
            issuer: https://westus2.oic.prod-aks.azure.com/2236b5e4-81d2-4d82-bde5-17b1037999ea/26b44ac4-fc37-4146-bce4-af02fa5dd145/
            clientID: argocd-mcp
            clientSecret: unused-public-client
            scopes:
              - openid
            getUserInfo: false
            insecureSkipEmailVerified: true
            userIDKey: sub
            userNameKey: sub
  # RBAC — default readonly, map admin by email
  rbac:
    policy.default: role:readonly
    scopes: '[email]'
    policy.csv: |
      g, nelson-devops-project@outlook.com, role:admin
      g, brenden.owens39@gmail.com, role:admin
      # mcp-argocd's projected SA token, validated by the aks-sa Dex
      # connector, surfaces as the OIDC subject below. Read-only for now —
      # tighten/expand alongside the MCP's tool surface.
      p, system:serviceaccount:mcp-argocd:mcp-argocd, applications, get, */*, allow
      p, system:serviceaccount:mcp-argocd:mcp-argocd, applications, sync, */*, allow
      p, system:serviceaccount:mcp-argocd:mcp-argocd, projects, get, *, allow
      p, system:serviceaccount:mcp-argocd:mcp-argocd, repositories, get, *, allow
      p, system:serviceaccount:mcp-argocd:mcp-argocd, clusters, get, *, allow

# Single replica — personal infra, no HA needed
controller:
  replicas: 1

server:
  replicas: 1
  # Gateway handles TLS termination — disable ArgoCD's internal TLS
  extraArgs:
    - --insecure

repoServer:
  replicas: 1

redis:
  enabled: true

# Dex handles SSO — supports multiple identity providers
dex:
  enabled: true

# Disable notifications (can enable later)
notifications:
  enabled: false

# Disable applicationSet (can enable later if needed)
applicationSet:
  enabled: false
