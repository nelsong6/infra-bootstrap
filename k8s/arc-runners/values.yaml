# ScaleSet name = the `runs-on:` label GitHub workflows target.
# Configure per-scale-set below; one Helm release per repo for now.
#
# No containerMode — runners execute jobs directly in the runner pod.
# Fine for pure-Go builds (fzt). If a workflow needs Docker or services,
# switch containerMode to `dind` or `kubernetes` here.

gha-runner-scale-set:
  runnerScaleSetName: fzt-runners

  githubConfigUrl: https://github.com/nelsong6/fzt
  githubConfigSecret: fzt-runners-github-config

  # Explicit controller reference — the scale-set chart otherwise does
  # a live cluster lookup for the controller SA, which fails in offline
  # `helm template` rendering (and ArgoCD uses helm template under the hood).
  controllerServiceAccount:
    namespace: arc-systems
    name: arc-controller-gha-rs-controller

  minRunners: 0
  maxRunners: 3

  template:
    spec:
      containers:
        - name: runner
          image: ghcr.io/actions/actions-runner:latest
          command: ["/home/runner/run.sh"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
