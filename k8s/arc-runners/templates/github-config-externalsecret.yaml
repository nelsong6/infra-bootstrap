# Pulls the GitHub App credentials from Key Vault into the shape
# gha-runner-scale-set expects (see githubConfigSecret in values.yaml).
# The controller reads these three keys to mint installation tokens
# for registering runners with GitHub.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fzt-runners-github-config
  namespace: arc-runners
spec:
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: fzt-runners-github-config
    creationPolicy: Owner
  data:
    - secretKey: github_app_id
      remoteRef:
        key: github-app-id
    - secretKey: github_app_installation_id
      remoteRef:
        key: github-app-installation-id
    - secretKey: github_app_private_key
      remoteRef:
        key: github-app-private-key
