apiVersion: v2
name: arc-runners-wrapper
version: 0.1.0
description: |
  AutoscalingRunnerSet for the nelsong6/fzt repo. Scales from 0 to 3 on
  demand. Each runner is a single-shot pod that receives one job then
  exits. GitHub App credentials are synced from Key Vault via an
  ExternalSecret into arc-runners/fzt-runners-github-config.
dependencies:
  - name: gha-runner-scale-set
    version: 0.12.1
    repository: oci://ghcr.io/actions/actions-runner-controller-charts
