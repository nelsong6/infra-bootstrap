# Shared Gateway. Platform-team-owned: controls port/protocol exposure and
# which namespaces may contribute listeners. Apps do NOT add listeners here —
# each app defines its own XListenerSet in its own namespace (experimental
# Gateway API feature, gateway.networking.x-k8s.io/v1alpha1) that attaches
# to this Gateway cross-namespace.
#
# The port-80 HTTP listener stays on this Gateway because cert-manager's
# letsencrypt-prod ClusterIssuer solves HTTP-01 challenges via a temporary
# HTTPRoute parented to this Gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: envoy-gateway-system
spec:
  gatewayClassName: eg
  allowedListeners:
    namespaces:
      from: All
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
