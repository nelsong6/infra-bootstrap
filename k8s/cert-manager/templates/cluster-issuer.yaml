# Let's Encrypt production ClusterIssuer.
# Uses HTTP-01 challenges via the Gateway API.
# cert-manager creates a temporary HTTPRoute on the shared gateway
# to respond to ACME challenges during certificate issuance.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: nelson@romaine.life
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: main
                namespace: envoy-gateway-system
---
# DNS-01 ClusterIssuer for wildcard certificates.
# HTTP-01 cannot issue wildcards; DNS-01 against Azure DNS can.
# Auth via workload identity on the shared managed identity (which
# already has DNS Zone Contributor on the romaine.life zone). The
# federated credential mapping infra-shared-identity to
# cert-manager's SA lives in tofu/aks.tf.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod-dns01
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: nelson@romaine.life
    privateKeySecretRef:
      name: letsencrypt-prod-dns01-key
    solvers:
      - dns01:
          azureDNS:
            resourceGroupName: infra
            subscriptionID: aee0cbd2-8074-4001-b610-0f8edb4eaa3c
            hostedZoneName: romaine.life
            environment: AzurePublicCloud
            managedIdentity:
              clientID: 44b0ff37-b886-4101-ab19-23388ead9c0b
