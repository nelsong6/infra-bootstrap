# Let's Encrypt production ClusterIssuer.
# Uses HTTP-01 challenges via the Gateway API.
# cert-manager creates a temporary HTTPRoute on the shared gateway
# to respond to ACME challenges during certificate issuance.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: nelson@romaine.life
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - group: gateway.networking.k8s.io
                kind: Gateway
                name: main
                namespace: envoy-gateway-system
