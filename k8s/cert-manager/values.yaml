cert-manager:
  installCRDs: false
  config:
    enableGatewayAPI: true
  webhook:
    validatingWebhookConfiguration:
      namespaceSelector:
        matchExpressions:
          - key: cert-manager.io/disable-validation
            operator: NotIn
            values:
              - "true"
          - key: control-plane
            operator: NotIn
            values:
              - "true"
          - key: kubernetes.azure.com/managedby
            operator: NotIn
            values:
              - aks
    mutatingWebhookConfiguration:
      namespaceSelector:
        matchExpressions:
          - key: cert-manager.io/disable-validation
            operator: NotIn
            values:
              - "true"
          - key: control-plane
            operator: NotIn
            values:
              - "true"
          - key: kubernetes.azure.com/managedby
            operator: NotIn
            values:
              - aks
