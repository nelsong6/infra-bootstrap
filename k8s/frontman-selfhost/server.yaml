apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontman-server
  namespace: frontman-selfhost
  labels:
    app: frontman-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontman-server
  template:
    metadata:
      labels:
        app: frontman-server
    spec:
      terminationGracePeriodSeconds: 5
      containers:
        - name: server
          image: hexpm/elixir:1.20.0-rc.4-erlang-29.0-rc3-debian-bookworm-20260421-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              apt-get update -y
              apt-get install -y --no-install-recommends git build-essential ca-certificates curl
              rm -rf /var/lib/apt/lists/* /workspace/frontman
              git clone --depth=1 https://github.com/frontman-ai/frontman.git /workspace/frontman
              cd /workspace/frontman/apps/frontman_server
              cp /frontman-entra-patches/entra_auth_controller.ex lib/frontman_server_web/controllers/entra_auth_controller.ex
              cp /frontman-entra-patches/new.html.heex lib/frontman_server_web/controllers/user_session_html/new.html.heex
              perl -0pi -e 's|get\("/", PageController, :home\)|get("/", PageController, :home)\n    get("/auth/entra", EntraAuthController, :request)|' lib/frontman_server_web/router.ex
              perl -0pi -e 's|  def home\(conn, _params\) do|  def home(conn, %{"code" => _code} = params) do\n    FrontmanServerWeb.EntraAuthController.callback(conn, params)\n  end\n\n  def home(conn, %{"error" => _error} = params) do\n    FrontmanServerWeb.EntraAuthController.callback(conn, params)\n  end\n\n  def home(conn, _params) do|' lib/frontman_server_web/controllers/page_controller.ex
              cat >> config/runtime.exs <<'EXS'

              if config_env() == :dev do
                import Config
                config :frontman_server, FrontmanServerWeb.Endpoint,
                  url: [host: System.get_env("PHX_HOST") || "localhost", port: 443, scheme: "https"],
                  http: [ip: {0, 0, 0, 0}, port: String.to_integer(System.get_env("PORT") || "4000")],
                  https: false,
                  watchers: [],
                  live_reload: [patterns: []]
              end
              EXS
              for i in 1 2 3 4 5; do curl -fsSL -o /tmp/hex.ez https://builds.hex.pm/installs/1.19.0/hex-2.4.2-otp-28.ez && break || sleep 5; done
              mix archive.install --force /tmp/hex.ez
              for i in 1 2 3 4 5; do curl -fsSL -o /tmp/rebar3 https://builds.hex.pm/installs/1.18.4/rebar3-3.25.1-otp-28 && break || sleep 5; done
              chmod +x /tmp/rebar3
              mix local.rebar --force rebar3 /tmp/rebar3
              mix deps.get
              until mix ecto.create; do sleep 3; done
              mix ecto.migrate
              mix run priv/repo/e2e_seeds.exs
              exec mix phx.server
          env:
            - name: MIX_ENV
              value: dev
            - name: PHX_SERVER
              value: "true"
            - name: PORT
              value: "4000"
            - name: PHX_HOST
              value: frontman-selfhost.glimmung.dev.romaine.life
            - name: PHX_URL_PORT
              value: "443"
            - name: DB_HOST
              value: postgres.frontman-selfhost.svc.cluster.local
            - name: DB_NAME
              value: frontman_server_dev
          envFrom:
            - secretRef:
                name: frontman-server-secrets
          volumeMounts:
            - name: entra-patches
              mountPath: /frontman-entra-patches
              readOnly: true
          ports:
            - name: http
              containerPort: 4000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
      volumes:
        - name: entra-patches
          configMap:
            name: frontman-entra-patches
---
apiVersion: v1
kind: Service
metadata:
  name: frontman-server
  namespace: frontman-selfhost
spec:
  selector:
    app: frontman-server
  ports:
    - name: http
      port: 80
      targetPort: http
