apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontman-server-secrets
  namespace: frontman-selfhost
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: romaine-kv
  target:
    name: frontman-server-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: CLOAK_KEY
      remoteRef:
        key: frontman-selfhost-cloak-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: frontman-selfhost-secret-key-base
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ENTRA_CLIENT_ID
      remoteRef:
        key: glimmung-oauth-test-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ALLOWED_EMAILS
      remoteRef:
        key: glimmung-oauth-allowed-emails
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
