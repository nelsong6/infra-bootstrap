apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: frontman-server-secrets
  namespace: frontman-selfhost
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: romaine-kv
  target:
    name: frontman-server-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: CLOAK_KEY
      remoteRef:
        key: frontman-selfhost-cloak-key
    - secretKey: SECRET_KEY_BASE
      remoteRef:
        key: frontman-selfhost-secret-key-base
