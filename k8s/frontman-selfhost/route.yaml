apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontman-server
  namespace: frontman-selfhost
spec:
  hostnames:
    - frontman-selfhost.glimmung.dev.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: glimmung-wildcard
      namespace: glimmung
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontman-server
          port: 80
