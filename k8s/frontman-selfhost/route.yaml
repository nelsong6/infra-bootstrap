apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontman-server
  namespace: frontman-selfhost
spec:
  hostnames:
    - frontman-selfhost.glimmung.dev.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: glimmung-wildcard
      namespace: glimmung
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frontman-server
          port: 80
          weight: 1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontman-1-server-paths
  namespace: frontman-selfhost
spec:
  hostnames:
    - frontman-1.glimmung.dev.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: glimmung-wildcard
      namespace: glimmung
  rules:
    - matches:
        - path:
            type: Exact
            value: /
        - path:
            type: PathPrefix
            value: /auth
        - path:
            type: PathPrefix
            value: /users
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /socket
        - path:
            type: PathPrefix
            value: /assets
        - path:
            type: PathPrefix
            value: /images
        - path:
            type: PathPrefix
            value: /phoenix
      backendRefs:
        - group: ""
          kind: Service
          name: frontman-server
          port: 80
          weight: 1
