# GatewayClass for Envoy Gateway.
# Not included in the Helm chart by design — the chart installs the
# controller and CRDs, the GatewayClass is created separately.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: eg
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
