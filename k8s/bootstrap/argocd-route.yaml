# HTTPRoute for ArgoCD UI.
# Routes argocd.romaine.life to the ArgoCD server service.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: main
      namespace: envoy-gateway-system
      sectionName: argocd-https
  hostnames:
    - argocd.romaine.life
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
