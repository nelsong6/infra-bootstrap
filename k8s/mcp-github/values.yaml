# ============================================================================
# mcp-github values
# ============================================================================
# Image is built and pushed by nelsong6/mcp-github's CI to romainecr. Until
# that CI lands a first image, the pod will ImagePullBackOff — expected
# during initial bring-up.

image:
  repository: romainecr.azurecr.io/mcp-github
  tag: latest
  # Always so `kubectl rollout restart` after a new :latest push fetches the
  # fresh image. Switch to a SHA tag + Image Updater later if drift becomes
  # a problem.
  pullPolicy: Always

hostname: github.mcp.romaine.life

containerPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
