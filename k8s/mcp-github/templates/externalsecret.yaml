# Syncs two groups of values into mcp-github-config:
#   - Entra JWT-validation config (tenant + expected audience)
#   - GitHub App install credentials (id, installation id, private key)
# Deployment envFroms the whole secret; the server reads everything from
# process env.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-github-config
  namespace: mcp-github
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-github-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Entra JWT validation — bearer tokens from Claude must match this
    # tenant + audience.
    #
    # Note on the verbose remoteRef blocks: ESO defaults conversionStrategy,
    # decodingStrategy, metadataPolicy, and nullBytePolicy when admitting the
    # resource. Without spelling them out explicitly, ArgoCD's server-side
    # diff sees the defaulted live state as drift and self-heals in a loop.
    - secretKey: ENTRA_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: ENTRA_AUDIENCE
      remoteRef:
        key: mcp-github-resource-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # GitHub App — pre-existing secrets written by bootstrap/setup-github-app.ps1.
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: github-app-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_INSTALLATION_ID
      remoteRef:
        key: github-app-installation-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: GITHUB_APP_PRIVATE_KEY
      remoteRef:
        key: github-app-private-key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
