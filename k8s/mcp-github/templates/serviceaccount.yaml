# Minimal SA — the server validates JWTs itself and calls GitHub (not
# Azure), so no workload-identity annotations are needed. The module
# creates a federated credential on the resource Entra app pointing at
# this SA for symmetry with mcp-azure, but the code path doesn't exercise
# it unless we add Azure-side calls later.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-github
  namespace: mcp-github
