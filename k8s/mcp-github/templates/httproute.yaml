apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-github
  namespace: mcp-github
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: mcp-github
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: mcp-github
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
