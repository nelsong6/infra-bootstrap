apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-github
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nelsong6/infra-bootstrap.git
    targetRevision: main
    path: k8s/mcp-github
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-github
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
