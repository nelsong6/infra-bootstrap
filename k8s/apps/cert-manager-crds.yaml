apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/cert-manager/cert-manager.git
    targetRevision: v1.20.2
    path: deploy/crds
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    # automated:
      # prune: true
      # selfHeal: true
    syncOptions:
      - ServerSideApply=true
