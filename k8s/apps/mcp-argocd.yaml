apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mcp-argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nelsong6/tank-operator.git
    targetRevision: main
    path: k8s-mcp-argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: mcp-argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
