apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: envoy-gateway-crds
  namespace: argocd
spec:
  project: default
  source:
    chart: gateway-crds-helm
    repoURL: registry-1.docker.io/envoyproxy
    targetRevision: v1.7.2
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    # automated:
      # prune: true
      # selfHeal: true
    syncOptions:
      - ServerSideApply=true
