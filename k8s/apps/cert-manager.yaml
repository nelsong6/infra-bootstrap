apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  source:
    chart: cert-manager
    repoURL: https://charts.jetstack.io
    targetRevision: v1.20.2
    helm:
      values: |
        installCRDs: true
        config:
          enableGatewayAPI: true
        webhook:
          namespaceSelector:
            matchExpressions:
              - key: control-plane
                operator: NotIn
                values:
                  - "true"
              - key: kubernetes.azure.com/managedby
                operator: NotIn
                values:
                  - aks
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
