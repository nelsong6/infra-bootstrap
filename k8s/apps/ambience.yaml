# ArgoCD Application for ambience — first app on the per-app K8s deployment
# pattern (infra-bootstrap#24). Source manifests live in the ambience repo
# under k8s/, keeping the app's infra with the app.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ambience
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nelsong6/ambience.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ambience
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
