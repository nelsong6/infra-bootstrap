apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oauth2-proxy
  namespace: argocd
spec:
  project: default
  source:
    chart: oauth2-proxy
    repoURL: https://oauth2-proxy.github.io/manifests
    targetRevision: 10.4.3
    helm:
      values: |
        config:
          existingSecret: oauth2-proxy-credentials
        extraArgs:
          provider: entra-id
          oidc-issuer-url: https://login.microsoftonline.com/common/v2.0
          insecure-oidc-skip-issuer-verification: "true"
          scope: "openid profile email"
          upstream: "http://argocd-server.argocd.svc.cluster.local:80"
          cookie-secure: "true"
          email-domain: "*"
          redirect-url: "https://argocd.romaine.life/oauth2/callback"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
