apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-crds
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/external-secrets/external-secrets.git
    targetRevision: helm-chart-2.3.0
    path: deploy/crds
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    # automated:
      # prune: true
      # selfHeal: true
    syncOptions:
      - ServerSideApply=true
