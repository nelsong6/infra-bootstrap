# ============================================================================
# mcp-azure values
# ============================================================================
# No tofu-minted IDs live here — tenant ID, resource app client ID, and
# workload-identity client ID are synced from Key Vault at runtime via the
# ExternalSecret in templates/externalsecret.yaml. See tofu/mcp.tf and
# tofu/mcp-server/ for the upstream definitions.

image:
  # Pin to a specific tag once verified — :latest is fine for initial bring-up.
  repository: mcr.microsoft.com/azure-sdk/azure-mcp
  tag: latest
  pullPolicy: IfNotPresent

hostname: azure.mcp.romaine.life

# Port azure-mcp's HTTP transport listens on.
containerPort: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 512Mi
