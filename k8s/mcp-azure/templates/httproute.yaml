# Dual parentRef mirrors argocd-route: XListenerSet owns HTTPS, Gateway main
# owns HTTP (needed for cert-manager HTTP-01 and ExternalDNS A-record sync).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mcp-azure
  namespace: mcp-azure
spec:
  hostnames:
    - {{ .Values.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: mcp-azure
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: mcp-azure
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
