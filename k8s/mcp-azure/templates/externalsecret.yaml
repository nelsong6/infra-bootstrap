# Syncs three values from Key Vault into a k8s Secret whose keys already
# match the env var names azure-mcp (and DefaultAzureCredential) read. The
# Deployment just `envFrom`s this — nothing hardcoded in values.yaml.
#
# mcp-azure-resource-client-id  → server's audience + workload-identity client
# mcp-tenant-id                 → shared tenant
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-config
  namespace: mcp-azure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-azure-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Generic DefaultAzureCredential / WorkloadIdentityCredential env vars.
    # The pod authenticates as the resource Entra app itself (not a separate
    # MI) via the OBO federated credential — so AZURE_CLIENT_ID is the
    # resource app's client ID.
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-resource-client-id
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
    # azure-mcp's own JWT-validation env vars (same values, different names).
    - secretKey: AZURE_AD_CLIENT_ID
      remoteRef:
        key: mcp-azure-resource-client-id
    - secretKey: AZURE_AD_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
