# Syncs the resource app's tenant and client ID from Key Vault into a k8s
# Secret, using two key spellings:
#   AZURE_*       — read by WorkloadIdentityCredential for outgoing OBO calls
#   AzureAd__*    — ASP.NET Core hierarchical config; the azure-mcp image
#                   binds these to MicrosoftIdentityApplicationOptions for
#                   inbound JWT validation and the OAuth metadata document
# The Deployment just `envFrom`s this — nothing hardcoded in values.yaml.
#
# mcp-azure-resource-client-id  → server's audience + OBO client ID
# mcp-tenant-id                 → shared tenant
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mcp-azure-config
  namespace: mcp-azure
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: romaine-kv
    kind: ClusterSecretStore
  target:
    name: mcp-azure-config
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # OBO outgoing-auth env vars. The pod authenticates as the resource Entra
    # app itself (not a separate MI) via the OBO federated credential — so
    # AZURE_CLIENT_ID is the resource app's client ID.
    #
    # Note on the verbose remoteRef blocks: ESO defaults conversionStrategy,
    # decodingStrategy, metadataPolicy, and nullBytePolicy when admitting the
    # resource. Without spelling them out explicitly, ArgoCD's server-side
    # diff sees the defaulted live state as drift and self-heals in a loop.
    - secretKey: AZURE_CLIENT_ID
      remoteRef:
        key: mcp-azure-resource-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AZURE_TENANT_ID
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    # ASP.NET Core config keys consumed by azure-mcp for JWT validation +
    # the OAuth metadata document at /.well-known/oauth-protected-resource.
    - secretKey: AzureAd__ClientId
      remoteRef:
        key: mcp-azure-resource-client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
    - secretKey: AzureAd__TenantId
      remoteRef:
        key: mcp-tenant-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
