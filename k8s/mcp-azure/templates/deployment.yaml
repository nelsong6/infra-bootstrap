apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-azure
  namespace: mcp-azure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-azure
  template:
    metadata:
      labels:
        app: mcp-azure
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: mcp-azure
      containers:
        - name: azure-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # HTTP transport is only built into the Docker distribution; see
          # docs/azmcp-commands.md. Flags mirror the azmcp-obo-template.
          args:
            - server
            - start
            - --transport
            - http
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          env:
            # JWT validation — azure-mcp expects tokens with this audience and
            # issued by this tenant.
            - name: AZURE_AD_TENANT_ID
              value: {{ .Values.oauth.tenantId | quote }}
            - name: AZURE_AD_CLIENT_ID
              value: {{ .Values.oauth.audience | quote }}
            - name: AZURE_AD_INSTANCE
              value: "https://login.microsoftonline.com/"
            # Workload identity projects these by default via the webhook —
            # declared explicitly for clarity; DefaultAzureCredential picks
            # them up for the OBO federated-assertion exchange.
            - name: AZURE_CLIENT_ID
              value: {{ .Values.serviceAccount.workloadIdentityClientId | quote }}
            - name: AZURE_TENANT_ID
              value: {{ .Values.oauth.tenantId | quote }}
          readinessProbe:
            httpGet:
              path: /.well-known/oauth-protected-resource
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
