apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-azure
  namespace: mcp-azure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-azure
  template:
    metadata:
      labels:
        app: mcp-azure
        # Triggers the Azure workload-identity webhook to project the SA
        # token; env var injection is intentionally skipped — we set the
        # Azure env vars ourselves from the ExternalSecret.
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: mcp-azure
      containers:
        - name: azure-mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The image entrypoint is already `./server-binary server start` — args
          # only override flags. HTTP transport ships only in the Docker image
          # (see docs/azmcp-commands.md). UseOnBehalfOf wires OBO outgoing auth.
          args:
            - --transport
            - http
            - --outgoing-auth-strategy
            - UseOnBehalfOf
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          envFrom:
            # AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_AD_* — synced from
            # Key Vault by the ExternalSecret.
            - secretRef:
                name: mcp-azure-config
          env:
            # Azure workload-identity projects the SA token here by default
            # when the pod carries the `azure.workload.identity/use` label.
            - name: AZURE_FEDERATED_TOKEN_FILE
              value: /var/run/secrets/azure/tokens/azure-identity-token
            - name: AZURE_AUTHORITY_HOST
              value: https://login.microsoftonline.com/
            # azure-mcp-specific: auth authority URL (separate from
            # AZURE_AUTHORITY_HOST used by WorkloadIdentityCredential).
            - name: AZURE_AD_INSTANCE
              value: https://login.microsoftonline.com/
          readinessProbe:
            httpGet:
              path: /.well-known/oauth-protected-resource
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
