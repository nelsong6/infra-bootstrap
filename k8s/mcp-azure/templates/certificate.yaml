# TLS cert via Let's Encrypt HTTP-01 — same pattern as argocd-tls.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mcp-azure-tls
  namespace: mcp-azure
spec:
  secretName: mcp-azure-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.hostname }}
