# App-owned HTTPS listener attached to the shared Gateway — same pattern as
# argocd-xlistenerset. HTTP listener on :80 stays on the parent Gateway
# (used for cert-manager HTTP-01 + ExternalDNS A-record propagation).
apiVersion: gateway.networking.x-k8s.io/v1alpha1
kind: XListenerSet
metadata:
  name: mcp-azure
  namespace: mcp-azure
spec:
  parentRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: main
    namespace: envoy-gateway-system
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.hostname }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: mcp-azure-tls
