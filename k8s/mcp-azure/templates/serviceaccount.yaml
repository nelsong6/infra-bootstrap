# ServiceAccount for the azure-mcp pod. Annotations wire it to the managed
# identity for outbound Azure calls; the federated credential on the MCP
# resource Entra app (created in tofu) trusts this same SA for the OBO
# client_assertion, so one identity + one SA covers both paths.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-azure
  namespace: mcp-azure
  annotations:
    azure.workload.identity/client-id: {{ .Values.serviceAccount.workloadIdentityClientId | quote }}
    azure.workload.identity/tenant-id: {{ .Values.oauth.tenantId | quote }}
