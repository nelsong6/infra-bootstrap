# ServiceAccount is minimal — no workload-identity annotations. Token
# projection is triggered by the `azure.workload.identity/use: "true"`
# label on the pod itself; env var injection is skipped (the webhook only
# injects when the SA is annotated), and we supply AZURE_CLIENT_ID /
# AZURE_TENANT_ID ourselves via envFrom on the Deployment.
#
# Federation lives on the MCP resource Entra app (set up in tofu), trusting
# `system:serviceaccount:mcp-azure:mcp-azure` — so the SA token Entra sees
# during the OBO client_assertion matches this SA's subject.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-azure
  namespace: mcp-azure
